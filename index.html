<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faber Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.5rem; }
    .logo span { color: #c8ff00; }
    .tagline { font-size: 1.1rem; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3rem; }
    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 0.5rem 1.4rem;
      font-size: 0.9rem;
      color: #666;
      letter-spacing: 0.05em;
    }
    footer { position: fixed; bottom: 1.5rem; font-size: 0.75rem; color: #333; }
  </style>
</head>
<body>
  <div class="logo">Faber<span>.</span>Studio</div>
  <p class="tagline">Something is being made</p>
  <div class="badge">Coming Soon</div>
  <footer>faberstudio.website</footer>
</body>
</html>
